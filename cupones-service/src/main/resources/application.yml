server:
  port: 0

spring:
  application:
    name: cupones-service

  datasource:
    url: jdbc:mysql://localhost:3306/cupones_db
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
